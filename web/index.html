  <body>
    <div id="root"></div>
    <div id="boot-error" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;display:none;align-items:center;justify-content:center;padding:20px;background:#0a0a0c;color:#fff;font-family:monospace;">
      <div style="max-width:600px;padding:24px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.4);border-radius:12px;">
        <p style="color:#ff8080;font-size:14px;margin:0 0 12px;font-weight:bold;">⚠️ Boot error</p>
        <pre id="boot-error-msg" style="font-size:11px;white-space:pre-wrap;color:#ffcccc;margin:0;max-height:300px;overflow:auto;"></pre>
        <button onclick="window.location.reload()" style="margin-top:16px;padding:8px 16px;background:#D4AF37;color:#0a0a0c;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">Reload</button>
      </div>
    </div>
    <script>
      (function() {
        var box = document.getElementById('boot-error');
        var msg = document.getElementById('boot-error-msg');
        function show(text) {
          if (box && msg) {
            box.style.display = 'flex';
            msg.textContent = text;
          }
        }
        window.addEventListener('error', function(e) {
          show((e.message || 'Unknown error') + '\n\nat ' + (e.filename || '?') + ':' + e.lineno + ':' + e.colno + '\n\n' + (e.error && e.error.stack || ''));
        });
        window.addEventListener('unhandledrejection', function(e) {
          show('Unhandled rejection: ' + (e.reason && e.reason.message || e.reason) + '\n\n' + (e.reason && e.reason.stack || ''));
        });
      })();
    </script>
    <script>
      // Set theme before paint to avoid flash
      (function () {
        try {
          var stored = localStorage.getItem("nurovia-ai-theme");
          var resolved = stored;
          if (!stored || stored === "system") {
            resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (resolved === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
