# ──────────────────────────────────────────────────────────────
# Nurovia AI — local production stack
# ──────────────────────────────────────────────────────────────
#
# Brings up: Postgres + the app in a single command.
# Test your prod build locally before deploying anywhere.
#
# Usage:
#   docker compose up
#   → app at http://localhost:3000
#   → postgres at localhost:5432
#   → runs schema migrations on first start
# ──────────────────────────────────────────────────────────────

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://nurovia:nurovia@db:5432/nurovia?sslmode=disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0PQ==}
      FRONTEND_URL: http://localhost:3000
      COOKIE_SECURE: "false"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nurovia
      POSTGRES_PASSWORD: nurovia
      POSTGRES_DB: nurovia
    volumes:
      - nurovia-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurovia -d nurovia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nurovia-db: